<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PERSEUS</title>
  </head>
  <body>
  
  <div id="app">

    <div class="app">

      <header class="topbar">

        <div class="logo">
          PERSEUS
        </div>

        <nav class="menu">

          <button id="btn-login">
            Login
          </button>

          <button id="btn-cadastro">
            Cadastro
          </button>

          <span id="usuario"></span>

          <button id="btn-logout">
            Sair
          </button>

          <button id="btn-perfil">
            ⚙️ Perfil
          </button>

          <button>Baixar App</button>

        </nav>

      </header>

      <div class="search-container">

        <div class="input-group">

          <div class="input-wrapper">

            <input
              id="origem"
              type="text"
              placeholder="Escolha o local de partida">

          </div>

          <button
            id="minha-localizacao"
            class="location-btn">

            📍

          </button>

        </div>

        <button
          id="trocar-rota"
          class="swap-btn">

          ⇄

        </button>

        <div class="input-group">

          <div class="input-wrapper">

            <input
              id="destino"
              type="text"
              placeholder="Escolha o destino">

          </div>

        </div>

        <button
          id="buscar"
          class="search-btn">

          🔍

        </button>

      </div>

      <div class="side-info">

        <div id="clima-card">

          <h3>🌦️ Clima</h3>

          <p>Carregando...</p>

        </div>

        <div id="rota-card">

          <h3>🛣️ Rota</h3>

          <p>Aguardando busca...</p>

          <button
            id="favoritar-destino"
            class="favorito-btn">

            ⭐ Favoritar destino

          </button>

        </div>

      </div>

      <div id="mapa-container">

        <div id="mapa"></div>

        <button id="btn-chat-ia">

          🤖

        </button>

      </div>

      <div class="bottom-section">

        <div id="linhas-card">

          <h3>🚌 Linhas disponíveis</h3>

          <ul id="lista-linhas"></ul>

        </div>

        <div id="favoritos-card">

          <h3>⭐ Favoritos</h3>

          <ul id="lista-favoritos">

            <li>Nenhum favorito salvo</li>

          </ul>

        </div>

        <div id="historico-card">

          <h3>🕒 Últimas buscas</h3>

          <ul id="lista-historico">

            <li>Nenhuma busca realizada</li>

          </ul>

        </div>

        <div id="estacao-card">

          <h3>🚉 Estação mais próxima</h3>

          <p id="nome-estacao">
            Carregando...
          </p>

          <img
            id="imagem-estacao"
            src="/barra-funda.jpg"
            alt="Estação">

        </div>

        </div>

      </div>

    </div>

  </div>

  <script
    type="module"
    src="/src/main.ts">
  </script>

  <div id="chat-ia">

  <div id="chat-header">

    <div class="chat-titulo">

      🤖 Assistente Perseus

    </div>

    <div class="chat-acoes">

      <button id="minimizar-chat">

        −

      </button>

      <button id="fechar-chat">

        ✕

      </button>

    </div>

  </div>

  <div id="chat-mensagens">

  </div>

  <div id="chat-input-area">

    <input
      type="text"
      id="input-ia"
      placeholder="Pergunte algo..."
    >

    <button id="enviar-ia">

      ➤

    </button>

  </div>

</div>

</body>
</html>
